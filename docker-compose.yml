services:
  postgres:
    image: postgres:18-alpine
    container_name: amip-full-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: amip_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "${AMIP_POSTGRES_PORT:-5434}:5432"
    volumes:
      - amip_postgres_data:/var/lib/postgresql/data
      - ./Backend/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amip_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: amip-full-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${AMIP_REDIS_PORT:-6381}:6379"
    volumes:
      - amip_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  amip_postgres_data:
  amip_redis_data:
