entries:
  - id: "what-is-amip"
    keywords:
      - "AMIP"
      - "what is AMIP"
      - "about AMIP"
      - "Arab Mining Indicators Portal"
      - "Portail arabe des indicateurs miniers"
      - "بوابة المؤشرات التعدينية العربية"
      - "ما هي AMIP"
    answer:
      en: "AMIP is the Arab Mining Indicators Portal, a digital portal specialized in displaying and analyzing indicators and data on mineral production, trade, and economic indicators across 21 Arab countries."
      ar: "AMIP هي بوابة المؤشرات التعدينية العربية، وهي بوابة رقمية متخصصة في عرض وتحليل المؤشرات والبيانات المتعلقة بإنتاج المعادن والتجارة والمؤشرات الاقتصادية في 21 دولة عربية."
      fr: "AMIP est le Portail arabe des indicateurs miniers, un portail numérique spécialisé dans la présentation et l'analyse des indicateurs et des données sur la production minière, le commerce et les indicateurs économiques dans 21 pays arabes."

  - id: "assistant-identity"
    keywords:
      - "who are you"
      - "what are you"
      - "your name"
      - "qui es-tu"
      - "qui es tu"
      - "qui êtes-vous"
      - "qui êtes vous"
      - "qui etes-vous"
      - "qui etes vous"
      - "vous êtes qui"
      - "vous etes qui"
      - "tu es quoi"
      - "من أنت"
      - "من انت"
      - "ما هذا المساعد"
    answer:
      en: "I am the AMIP assistant, here to answer questions about mining, minerals, and trade data for 21 Arab countries."
      ar: "أنا مساعد AMIP، مخصص للإجابة عن الأسئلة المتعلقة بالتعدين والمعادن وبيانات التجارة في 21 دولة عربية."
      fr: "Je suis l'assistant AMIP, conçu pour répondre aux questions sur l'exploitation minière, les minéraux et les données commerciales de 21 pays arabes."

  - id: "assistant-capabilities"
    keywords:
      - "what can you do"
      - "how can you help"
      - "que peux-tu faire"
      - "que peux tu faire"
      - "comment peux-tu m'aider"
      - "comment peux tu m aider"
      - "ماذا يمكنك أن تفعل"
      - "ماذا يمكنك ان تفعل"
      - "كيف تساعدني"
    answer:
      en: "I can help with production statistics, trade exports and imports, rankings and comparisons, charts, and country or mineral profiles, all sourced from AMIP data."
      ar: "يمكنني المساعدة في إحصاءات الإنتاج، والصادرات والواردات التجارية، والترتيبات والمقارنات، والرسوم البيانية، وملفات الدول أو المعادن، وكل ذلك بالاعتماد على بيانات AMIP."
      fr: "Je peux vous aider avec les statistiques de production, les exportations et importations, les classements et comparaisons, les graphiques, ainsi que les profils de pays ou de minéraux, à partir des données AMIP."

  - id: "minerals-covered"
    keywords:
      - "what minerals"
      - "which minerals"
      - "covered minerals"
      - "available minerals"
      - "phosphate"
      - "copper"
      - "gold"
      - "iron ore"
      - "potash"
      - "المعادن المتوفرة"
      - "أي معادن"
    answer:
      en: "AMIP covers solid minerals and mining products such as phosphate, iron ore, gold, copper, zinc, lead, silver, gypsum, salt, potash, barite, feldspar, kaolin, manganese, and cement. It does not cover oil or natural gas."
      ar: "تغطي بوابة AMIP المعادن الصلبة والمنتجات التعدينية مثل الفوسفات وخام الحديد والذهب والنحاس والزنك والرصاص والفضة والجبس والملح والبوتاس والباريت والفلسبار والكاولين والمنغنيز والأسمنت. ولا تغطي البوابة النفط أو الغاز الطبيعي."
      fr: "AMIP couvre les minéraux solides et les produits miniers tels que le phosphate, le minerai de fer, l'or, le cuivre, le zinc, le plomb, l'argent, le gypse, le sel, la potasse, la barytine, le feldspath, le kaolin, le manganèse et le ciment. Le portail ne couvre ni le pétrole ni le gaz naturel."

  - id: "data-sources"
    keywords:
      - "data source"
      - "where data"
      - "data from"
      - "sources"
      - "bilateral"
      - "trade data"
      - "production data"
      - "مصادر البيانات"
      - "من أين البيانات"
    answer:
      en: "AMIP integrates data from multiple sources including bilateral trade records, national statistics, commodity exchanges, and international trade organizations."
      ar: "تدمج منصة AMIP البيانات من مصادر متعددة بما في ذلك سجلات التجارة الثنائية والإحصائيات الوطنية وبورصات السلع والمنظمات التجارية الدولية."
      fr: "AMIP intègre les données de plusieurs sources, notamment les enregistrements du commerce bilatéral, les statistiques nationales, les bourses de marchandises et les organisations commerciales internationales."

  - id: "time-period"
    keywords:
      - "time period"
      - "year range"
      - "years available"
      - "historical data"
      - "time frame"
      - "when data"
      - "الفترة الزمنية"
      - "السنوات"
    answer:
      en: "AMIP currently contains data for the years 2010 to 2024 (production), with trade data through 2023."
      ar: "تحتوي بوابة AMIP حاليًا على بيانات للأعوام من 2010 إلى 2024 (الإنتاج)، مع بيانات التجارة حتى عام 2023."
      fr: "AMIP contient actuellement des données pour les années 2010 à 2024 (production), avec des données commerciales jusqu'en 2023."

  - id: "help-search"
    keywords:
      - "how to search"
      - "how to query"
      - "how to ask"
      - "help"
      - "guide"
      - "tutorial"
      - "كيفية البحث"
      - "كيف أسأل"
      - "مساعدة"
    answer:
      en: "You can ask questions about mineral production, trade flows, country comparisons, and trends. For example: 'What was Saudi Arabia's phosphate production in 2022?' or 'Compare copper exports between UAE and Egypt'."
      ar: "يمكنك طرح أسئلة حول إنتاج المعادن وتدفقات التجارة ومقارنات الدول والاتجاهات. على سبيل المثال: 'ما كان إنتاج السعودية من الفوسفات في 2022؟' أو 'قارن صادرات النحاس بين الإمارات ومصر'."
      fr: "Vous pouvez poser des questions sur la production minière, les flux commerciaux, les comparaisons entre pays et les tendances. Par exemple: 'Quelle était la production de phosphate de l'Arabie Saoudite en 2022?' ou 'Comparez les exportations de cuivre entre les Émirats et l'Égypte'."

  - id: "countries-covered"
    keywords:
      - "which countries"
      - "Arab countries"
      - "Arab nations"
      - "country list"
      - "countries included"
      - "الدول العربية"
      - "أي دول"
      - "قائمة الدول"
    answer:
      en: "AMIP covers all Arab League member states including Saudi Arabia, UAE, Egypt, Iraq, Kuwait, Qatar, Bahrain, Oman, Yemen, Syria, Lebanon, Palestine, Jordan, and others."
      ar: "تغطي منصة AMIP جميع دول أعضاء جامعة الدول العربية بما في ذلك السعودية والإمارات ومصر والعراق والكويت وقطر والبحرين وعمان واليمن والشام ولبنان وفلسطين والأردن وغيرها."
      fr: "AMIP couvre tous les États membres de la Ligue arabe, y compris l'Arabie Saoudite, les Émirats, l'Égypte, l'Irak, le Koweït, le Qatar, Bahreïn, Oman, le Yémen, la Syrie, le Liban, la Palestine, la Jordanie et d'autres."

  - id: "languages-supported"
    keywords:
      - "what languages"
      - "which languages"
      - "languages supported"
      - "supported languages"
      - "available languages"
      - "language support"
      - "what languages does amip support"
      - "what languages does the portal support"
      - "amip multilingual"
      - "portal multilingual"
      - "multilingual"
      - "trilingual"
      - "do you speak french"
      - "do you speak arabic"
      - "do you speak english"
      - "quelles langues"
      - "dans quelles langues"
      - "langues prises en charge"
      - "langues disponibles"
      - "plusieurs langues"
      - "langue du portail"
      - "portail multilingue"
      - "tu parles français"
      - "tu parles francais"
      - "parlez-vous français"
      - "parlez-vous francais"
      - "tu parles"
      - "ما هي اللغات"
      - "اللغات المدعومة"
      - "اللغات المتوفرة"
      - "اللغات المتاحة"
      - "ما هي اللغات المدعومة"
      - "بأي لغة"
      - "هل تتحدث العربية"
      - "هل تتكلم"
    answer:
      en: "AMIP is fully trilingual and works in three languages: English, French, and Arabic. The entire portal — the interface, dashboards, mineral and country names, generated reports, and this chatbot — is available in all three, and you can ask your questions in any of them."
      ar: "بوابة AMIP متعددة اللغات بالكامل وتعمل بثلاث لغات: العربية والإنجليزية والفرنسية. جميع أجزاء البوابة — الواجهة ولوحات المعلومات وأسماء المعادن والدول والتقارير المُنشأة وروبوت المحادثة هذا — متاحة باللغات الثلاث، ويمكنك طرح أسئلتك بأي منها."
      fr: "AMIP est entièrement trilingue et fonctionne en trois langues : l'anglais, le français et l'arabe. L'ensemble du portail — l'interface, les tableaux de bord, les noms des minéraux et des pays, les rapports générés et ce chatbot — est disponible dans les trois langues, et vous pouvez poser vos questions dans n'importe laquelle d'entre elles."
